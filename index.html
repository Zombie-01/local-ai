<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Search</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
    }

    .container {
      width: 100%;
      max-width: 720px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 32px;
      text-align: center;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 16px;
      opacity: 0.95;
    }

    .search-section {
      padding: 32px;
    }

    .search-form {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .search-input {
      flex: 1;
      padding: 16px 20px;
      font-size: 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      outline: none;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .search-input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .search-input::placeholder {
      color: #94a3b8;
    }

    .search-button {
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      white-space: nowrap;
    }

    .search-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
    }

    .search-button:active {
      transform: translateY(0);
    }

    .search-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .results-container {
      min-height: 300px;
      max-height: 500px;
      overflow-y: auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
    }

    .results-container::-webkit-scrollbar {
      width: 6px;
    }

    .results-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .results-container::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }

    .results-container::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #64748b;
      font-size: 16px;
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid #e2e8f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .message-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
      animation: fadeIn 0.4s ease-out;
    }

    .message {
      padding: 16px;
      border-radius: 12px;
      line-height: 1.6;
      max-width: 90%;
      word-wrap: break-word;
    }

    .message.user {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      background: #f1f5f9;
      color: #334155;
      border-left: 4px solid #667eea;
      border-bottom-left-radius: 4px;
    }

    .result-item {
      padding: 20px;
      border-left: 4px solid #667eea;
      background: #f8fafc;
      border-radius: 8px;
      margin-bottom: 16px;
      animation: fadeIn 0.4s ease-out;
      line-height: 1.7;
      color: #334155;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .result-item:last-child {
      margin-bottom: 0;
    }

    .empty-state {
      text-align: center;
      padding: 60px 32px;
      color: #94a3b8;
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 16px;
    }

    .error {
      background: #fef2f2;
      border-left-color: #ef4444;
      color: #991b1b;
    }

    @media (max-width: 640px) {
      .header h1 {
        font-size: 24px;
      }

      .search-form {
        flex-direction: column;
      }

      .search-button {
        width: 100%;
      }

      .search-section {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📚 Book Search</h1>
      <p>Search through the book content instantly</p>
    </div>

    <div class="search-section">
      <div id="messages" class="results-container">
        <div class="empty-state">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
          <p>Start a conversation about the book</p>
        </div>
      </div>

      <form id="searchForm" class="search-form">
        <input
          type="text"
          id="query"
          class="search-input"
          placeholder="Ask about the book..."
          required
          autocomplete="off"
        >
        <button type="submit" class="search-button" id="submitBtn">
          Send
        </button>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('searchForm');
    const input = document.getElementById('query');
    const messagesDiv = document.getElementById('messages');
    const submitBtn = document.getElementById('submitBtn');

    const conversation = [];

    function renderMessages() {
      if (conversation.length === 0) {
        messagesDiv.innerHTML = `
          <div class="empty-state">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <p>Start a conversation about the book</p>
          </div>
        `;
        return;
      }

      messagesDiv.innerHTML = conversation.map(msg => `
        <div class="message-group">
          <div class="message user">${escapeHtml(msg.query)}</div>
          <div class="message bot">${msg.results.map(r => escapeHtml(r)).join('<br><br>')}</div>
        </div>
      `).join('');

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    form.onsubmit = async (e) => {
      e.preventDefault();

      const query = input.value.trim();
      if (!query) return;

      input.value = '';
      submitBtn.disabled = true;

      const messageGroup = document.createElement('div');
      messageGroup.className = 'message-group';
      messageGroup.innerHTML = `
        <div class="message user">${escapeHtml(query)}</div>
        <div class="loading">
          <div class="spinner"></div>
          <div>Searching...</div>
        </div>
      `;
      messagesDiv.innerHTML = '';
      messagesDiv.appendChild(messageGroup);

      try {
        const response = await fetch('/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query })
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        const results = (data.results && data.results.length > 0)
          ? data.results
          : ['No results found for this query.'];

        conversation.push({ query, results });
        renderMessages();
      } catch (error) {
        conversation.push({
          query,
          results: [`Error: ${error.message}`]
        });
        renderMessages();
      } finally {
        submitBtn.disabled = false;
        input.focus();
      }
    };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    input.focus();
  </script>
</body>
</html>
